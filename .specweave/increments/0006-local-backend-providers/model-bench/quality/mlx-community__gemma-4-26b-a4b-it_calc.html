```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --btn-bg: #334155;
            --btn-hover: #475569;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
            width: 100%;
            max-width: 800px;
        }

        @media (max-width: 650px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        .calculator {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .display {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #expression {
            font-size: 1.2rem;
            color: var(--text-dim);
            min-height: 1.5rem;
            word-break: break-all;
        }

        #result {
            font-size: 2.5rem;
            font-weight: 700;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-operator {
            color: var(--accent);
        }

        .btn-clear {
            color: var(--danger);
        }

        .btn-equals {
            background-color: var(--accent);
            grid-column: span 2;
        }

        .btn-equals:hover {
            background-color: var(--accent-hover);
        }

        .history-panel {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .history-panel h3 {
            margin-bottom: 16px;
            font-size: 1.2rem;
            color: var(--text-dim);
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--btn-bg);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-exp {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .history-res {
            font-size: 1.1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="calculator">
        <div class="display">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" onclick="clearAll()">C</button>
            <button class="btn-operator" onclick="appendOperator('/')">/</button>
            <button class="btn-operator" onclick="appendOperator('*')">×</button>
            <button class="btn-operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="btn-operator" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="btn-operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="calculate()">=</button>

            <button style="grid-column: span 2;" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <!-- The equals button is handled by the grid layout logic -->
        </div>
    </div>

    <div class="history-panel">
        <h3>History</h3>
        <ul id="history-list" class="history-list">
            <!-- History items injected here -->
        </ul>
    </div>
</div>

<script>
    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let shouldResetScreen = false;
    let history = [];

    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');
    const historyListEl = document.getElementById('history-list');

    function appendNumber(number) {
        if (currentInput === '0' || shouldResetScreen) {
            currentInput = number;
            shouldResetScreen = false;
        } else {
            if (number === '.' && currentInput.includes('.')) return;
            currentInput += number;
        }
        updateDisplay();
    }

    function appendOperator(op) {
        if (operator !== null) calculate();
        previousInput = currentInput;
        operator = op;
        shouldResetScreen = true;
        updateDisplay();
    }

    function clearAll() {
        currentInput = '0';
        previousInput = '';
        operator = null;
        shouldResetScreen = false;
        updateDisplay();
    }

    function deleteLast() {
        if (currentInput.length === 1) {
            currentInput = '0';
        } else {
            currentInput = currentInput.slice(0, -1);
        }
        updateDisplay();
    }

    function calculate() {
        if (operator === null || shouldResetScreen) return;
        
        let result;
        const prev = parseFloat(previousInput);
        const current = parseFloat(currentInput);

        if (isNaN(prev) || isNaN(current)) return;

        switch (operator) {
            case '+': result = prev + current; break;
            case '-': result = prev - current; break;
            case '*': result = prev * current; break;
            case '/': 
                if (current === 0) {
                    alert("Cannot divide by zero");
                    clearAll();
                    return;
                }
                result = prev / current; 
                break;
            default: return;
        }

        // Add to history before resetting
        addToHistory(`${previousInput} ${operator} ${currentInput}`, result);

        currentInput = result.toString();
        operator = null;
        shouldResetScreen = true;
        updateDisplay();
    }

    function updateDisplay() {
        expressionEl.innerText = operator ? `${previousInput} ${operator}` : '';
        resultEl.innerText = currentInput;
    }

    function addToHistory(exp, res) {
        history.unshift({ exp, res });
        if (history.length > 5) history.pop();
        renderHistory();
    }

    function renderHistory() {
        historyListEl.innerHTML = '';
        history.forEach(item => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <div class="history-exp">${item.exp}</div>
                <div class="history-res">= ${item.res}</div>
            `;
            historyListEl.appendChild(li);
        });
    }

    // Keyboard Support
    window.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
        if (e.key === '.') appendNumber('.');
        if (e.key === '=' || e.key === 'Enter') calculate();
        if (e.key === 'Backspace') deleteLast();
        if (e.key === 'Escape') clearAll();
        if (['+', '-', '*', '/'].includes(e.key)) appendOperator(e.key);
    });

</script>

</body>
</html>
