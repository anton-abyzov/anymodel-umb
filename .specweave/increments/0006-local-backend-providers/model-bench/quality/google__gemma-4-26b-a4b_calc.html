<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCalc - Modern Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --btn-bg: #334155;
            --btn-hover: #475569;
            --op-color: #fbbf24;
            --danger: #ef4444;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            transition: all 0.3s ease;
        }

        @media (max-width: 700px) {
            .app-container {
                grid-template-columns: 1fr;
            }
            .history-panel {
                order: 2;
            }
        }

        /* Calculator Main Card */
        .calculator-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .display {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 16px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            word-break: break-all;
        }

        .expression {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 8px;
            min-height: 1.5em;
        }

        .current-value {
            color: var(--text-primary);
            font-size: 2.5rem;
            font-weight: 700;
            overflow: hidden;
        }

        /* Buttons Grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            background: var(--btn-bg);
            color: var(--text-primary);
            transition: all 0.15s ease;
            user-select: none;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0px);
        }

        .btn-operator {
            color: var(--op-color);
        }

        .btn-clear {
            color: var(--danger);
        }

        .btn-equals {
            background: var(--accent);
            color: var(--bg-color);
            grid-column: span 2;
        }

        .btn-equals:hover {
            background: var(--accent-hover);
        }

        /* History Panel */
        .history-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .history-header {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--btn-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .history-exp {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: block;
        }

        .history-res {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            display: block;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 20px;
        }

        .clear-history-btn {
            font-size: 0.7rem;
            padding: 4px 8px;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 4px;
        }

        .clear-history-btn:hover {
            background: var(--danger);
            color: white;
        }
    </style>
</head>
